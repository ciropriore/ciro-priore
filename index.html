<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ciro Priore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#fff;color:#000;font-family:'Archivo',sans-serif;font-size:13px}
#wrap{display:grid;grid-template-columns:320px 1fr;position:fixed;top:34px;bottom:34px;left:0;right:0}

/* ── LEFT ── */
#left{height:100%;overflow-y:auto;padding:8px 0 8px;scrollbar-width:none;-ms-overflow-style:none;border-right:1px solid #000}
#lh{padding:28px 28px 24px;position:sticky;top:0;background:#fff;z-index:5}
.ln{font-size:13px;font-weight:700;color:#000;cursor:pointer;display:block;line-height:1.5}
.ln:hover,.ln.on{opacity:1}
.ln{font-size:13px;font-weight:700;color:#000;cursor:pointer;display:block;line-height:1.5}
.ls{font-size:13px;font-weight:400;color:#000;cursor:pointer;display:block}
.ls:hover,.ls.on{opacity:1}

/* index */
#idx{}
.l0{display:block;padding:10px 28px 3px;font-size:13px;font-weight:700;color:#000;cursor:pointer;width:100%;text-align:left;background:none;border:none;font-family:inherit;letter-spacing:0;text-transform:none}
.l0:hover,.l0.on{opacity:1}
.l0b{display:none;margin-bottom:4px}
.l0b.on{display:block}
.l1{display:block;padding:4px 28px 2px 40px;font-size:13px;font-weight:400;color:#000;cursor:pointer;width:100%;text-align:left;background:none;border:none;font-family:inherit;letter-spacing:0;text-transform:none}
.l1:hover,.l1.on{opacity:1}
.l1b{display:none}
.l1b.on{display:block}

/* item rows */
.item{display:block;padding:2px 28px 2px 52px;cursor:pointer;line-height:1.5}
#idx.has-active .item:not(.on){display:none}
.item-line{display:flex;align-items:baseline;gap:0}
.item-code{font-size:10px;color:#000;width:80px;flex-shrink:0;font-variant-numeric:tabular-nums}
.item-title{font-size:13px;font-weight:400;color:#000;line-height:1.5;flex:1}
.item:hover .item-title{font-size:13px;font-weight:400;color:#000;line-height:1.5;flex:1}

/* active item — expands */
.item.on{padding-bottom:22px}
.item.on .item-code{font-size:10px;color:#000;width:80px;flex-shrink:0;font-variant-numeric:tabular-nums}
.item.on .item-title{font-weight:700;text-decoration:underline;display:inline;margin-bottom:0}
.item-sub{display:none;font-size:13px;font-weight:400;color:#000;line-height:1.5;margin-bottom:0;padding-left:80px}
.item.on .item-sub{display:block}
.item-desc{display:none;font-size:13px;font-weight:400;color:#000;line-height:1.5;max-width:380px;padding-left:80px}
.item.on .item-desc{display:block;font-size:13px;font-weight:400;color:#000;line-height:1.5;max-width:380px;padding-left:80px}
.item-more{display:none;font-size:13px;font-weight:400;color:#000;cursor:pointer;margin-right:14px;text-decoration:underline;padding-left:80px}
.item-more:hover{opacity:1}
.item-related{display:none;font-size:13px;font-weight:400;color:#000;cursor:pointer;text-decoration:underline}
.item-related:hover{opacity:1}
.item.on .item-related{display:inline-block;font-size:13px;font-weight:400;color:#000;cursor:pointer;text-decoration:underline}
.item.on .item-more{display:inline-block;font-size:13px;font-weight:400;color:#000;cursor:pointer;margin-right:14px;text-decoration:underline;padding-left:80px}
.item-link{display:none;font-size:13px;font-weight:400;color:#000;text-decoration:underline}
.item.on .item-link{display:inline-block;font-size:13px;font-weight:400;color:#000;text-decoration:underline}
.item-link:hover{opacity:1}

/* bio page */
#bio-page{display:none;padding:0 28px}
.bio-text{font-size:13px;line-height:1.5;max-width:440px}

/* ── RIGHT ── */
#right{height:100%;overflow-y:auto;padding:8px;scrollbar-width:none;-ms-overflow-style:none}
#img-grid{
  display:flex;
  flex-direction:column;
  gap:0;
}
.proj-group{
  margin-bottom:0;
}
.proj-group-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-auto-rows:calc((100vw - 320px - 3*8px) / 4 * 2 / 3);
  gap:8px;
}
/* each cell: square-ish, white bg, black border */
.cell{
  background:#fff;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  border:1px solid #000;
}
.cell.h1{}
.cell.h2{grid-row:span 2}
#left::-webkit-scrollbar,#right::-webkit-scrollbar,#right::-webkit-scrollbar{display:none}
.cell img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;z-index:2}
.cell-placeholder-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:10px;color:#000;font-family:'Archivo',sans-serif;text-align:center;pointer-events:none;line-height:1.4;white-space:nowrap;z-index:1;}
.cell.revealed img{display:block}
.cell.revealed{border:none}
.cell.revealed:hover img{opacity:.8}
/* empty cells: border + diagonal */
.cell-empty{border:1px solid #000;background:#fff}
.cell:hover{opacity:1}

/* diagonal for empty slots */
.cell-empty::after{
  content:'';
  position:absolute;inset:0;
  background:
    linear-gradient(to bottom right,
      transparent calc(50% - .5px),
      #000 calc(50% - .5px),
      #000 calc(50% + .5px),
      transparent calc(50% + .5px));
}
/* project label above each group */
.proj-label{font-size:0;color:transparent;padding:34px 0 0;line-height:1.5;user-select:none;pointer-events:none}
.proj-label:first-child{padding-top:8px}

/* ── CUSTOM SCROLLBAR DOTS ── */
.scroll-dot{position:fixed;width:6px;height:6px;border-radius:50%;background:#000;pointer-events:none;z-index:300;transition:top .08s linear;display:none}
#scroll-dot-left{left:8px}
#scroll-dot-right{right:8px}
body.mo-mode .scroll-dot{background:#fff}

/* ── TOP BAR ── */
#tb{position:fixed;top:0;left:0;right:0;height:34px;background:#fff;border-bottom:1px solid #000;display:flex;align-items:center;padding:0 28px;z-index:200}
.tbi{font-size:13px;font-weight:400;color:#000;cursor:pointer;margin-right:20px}
.tbi.on{font-weight:700}
body.mo-mode #tb{background:#000;border-bottom:1px solid #fff}
body.mo-mode .tbi{color:#fff}
body.mo-mode{background:#000;color:#fff}
body.mo-mode #lh{background:#000}
body.mo-mode #bn{background:#000;border-top:1px solid #333}
body.mo-mode .ln,.mo-mode .ls,.mo-mode .l0,.mo-mode .l1,.mo-mode .item,.mo-mode .item-title,.mo-mode .item-code,.mo-mode .item-sub,.mo-mode .item-desc,.mo-mode .item-more,.mo-mode .item-link,.mo-mode .item-related,.mo-mode .bn-mail{color:#fff}
body.mo-mode .item:hover .item-title{color:#fff}
body.mo-mode .item.on .item-title{color:#fff}
body.mo-mode .cell{background:#000;border:1px solid #fff}
body.mo-mode .cell-empty{background:#000;border:1px solid #fff}
body.mo-mode .cell.revealed{border:1px solid #fff}
body.mo-mode #search-overlay{background:#000}
body.mo-mode #search-input{border-bottom:1px solid #fff;color:#fff}
body.mo-mode .search-result{border-bottom:1px solid #fff !important;color:#fff !important}
body.mo-mode .search-result span{color:#fff !important}
body.mo-mode .cell-placeholder-label{color:#fff}
body.mo-mode .cell-empty::after{background:linear-gradient(to bottom right,transparent calc(50% - .5px),#fff calc(50% - .5px),#fff calc(50% + .5px),transparent calc(50% + .5px))}
body.mo-mode #modal-inner{background:#000;border:1.5px solid #fff;color:#fff}
body.mo-mode #modal-title{color:#fff}
body.mo-mode #modal-text{color:#fff}
body.mo-mode #modal-close{color:#fff}
body.mo-mode #lb{background:rgba(0,0,0,.92)}
body.mo-mode #lb-inner{background:#000;border:1.5px solid #fff}

body.mo-mode .proj-label{color:transparent}

/* ── CP/MO PAGE BN ACTIVE ── */

.bni{font-size:13px;font-weight:400;color:#000;cursor:pointer;margin-right:20px}

#modal-close{position:absolute;top:16px;right:20px;font-size:18px;cursor:pointer;opacity:1;line-height:1.5}
#modal-close:hover{opacity:1}

#modal-text{font-size:13px;font-weight:400;line-height:1.5;color:#000}

#lb-inner{border:1.5px solid #000;background:#fff;position:relative;max-width:90vw;max-height:90vh;display:flex;align-items:center;justify-content:center}
#lb-img{max-width:88vw;max-height:88vh;object-fit:contain;display:block}
#lb-x{position:absolute;top:-32px;right:0;font-size:18px;cursor:pointer;opacity:1;line-height:1.5;color:#000}
#lb-x:hover{opacity:1}

#lb-p:hover,#lb-n:hover{opacity:1}

@media (max-width:768px){
  #wrap{grid-template-columns:1fr}

  .item-code{width:60px}
  .item-grid-mobile{display:none;margin:8px 0 4px 0;padding:0 20px 0 40px}
  .item.on .item-grid-mobile{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
  .item-grid-mobile .mob-cell{position:relative;overflow:hidden;border:1px solid #000;aspect-ratio:3/2;background:#fff}
  .item-grid-mobile .mob-cell.v{grid-row:span 2;aspect-ratio:2/3}
  .item-grid-mobile .mob-cell img,.item-grid-mobile .mob-cell video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}

@media (max-width:768px){
  body.mo-mode .item-grid-mobile .mob-cell{border:1px solid #fff;background:#000}

          {code:'',t:'Per un\u2019architettura Swishable',sub:'with Russo, M. — Scarto Zine n. 3, Filoferro Architetti / Concretipo.',d:'Per un\u2019architettura Swishable is an essay written with Martina Russo for Scarto Zine n. 3, edited by Filoferro Architetti and published by Concretipo.<br><br>The concept of affections is necessarily linked to the memory of places we have inhabited and architectures we have consumed. It develops over time, sharpening our sensitivity towards our landscapes. We have been taught that seeing differs from looking \u2014 and all these glances we have scattered throughout our time pile up in more or less orderly fashion to be retrieved in our brief memory, perhaps constituting a method. Through experience, a process akin to the maniacal is activated: where everything finds its reason, or where, at least, one attempts to uncover the reason for everything. A collection of autobiographical notes fills the pages of a retroactive diary of anonymous and notable projects. These architectures are preserved and become part of an interior catalogue of knowledge \u2014 of electric impulses which, assembled, constitute the core of every architect.<br><br><strong>Published in</strong><br>Scarto Zine n. 3, Filoferro Architetti / Concretipo<br><br><strong>Authors</strong><br>Ciro Priore, Martina Russo<br><br><strong>Contributors</strong><br>Francesco Caneschi, Collettivo Jarfalla, Giulio Margheri \u2013 Caret Studio, Materia Ordinaria, Laura Mucciolo, Rispoli Guerrera',layout:["v", "h", "h", "v", "h", "v", "e", "e", "e"],imgs:["", "", "", "", "", ""]},

          {code:'[07-EXH]',t:'Moriana Park \u2014 Mirabilia, Casa Cava',sub:'2020 \u00b7 International group exhibition, by invitation. Casa Cava, Matera.',d:'',layout:['v','h','h'],imgs:["img/07EXH/07EXH1.jpg","img/07EXH/07EXH2.jpg","img/07EXH/07EXH3.jpg"]},
          {code:'[03-EXH]',t:'Villaggio Italia \u2014 N\u00f3veN\u00f3veN\u00f3ve',sub:'2019 \u00b7 International group exhibition, by invitation. Torre del Castello Melodia, Ruvo di Puglia.',d:'Villaggio Italia investigates the spatial and cultural consequences of mass tourism on the Italian territory. Developed from research begun during the master’s thesis on the Domitio coastline, the project reads the holiday village as a symptomatic urban type: a model of domesticity compressed, repeated and detached from its context, designed for temporary occupation and disposable experience.<br><br>The installation proposes a critical and dystopian portrait of a country increasingly shaped by the tourism industry — a “holiday-on-display” in which micro-visions of an Italy devoted to the vacation economy open up. It raises questions about the sustainability of these dynamics and their cultural, economic and environmental consequences on local identities and territorial equilibria.<br><br>Presented at the group exhibition <em>Mutazioni</em>, part of the Nòve Nòve Nòve festival, Ruvo di Puglia, 2019. Curated by Antilia Gallery.',related:'Villaggio Italia \u2014 N\u00f3veN\u00f3veN\u00f3ve | [04-RJA] Villaggio Italia',layout:["v", "h", "h", "v", "h", "h", "v", "h", "h", "h", "v", "h", "h", "v", "h", "h", "h", "e", "e"],imgs:["", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", ""]},

  mo:{
    bio:"Materia Ordinaria Architetti is a Naples-based practice founded by Ciro Priore and Martina Russo in 2018. The name \u2014 ordinary matter \u2014 is a declaration: the raw material of the project is what is already there.",
    sections:[
      {k:'int',l:'Interior',subs:[
        {k:'int-all',l:'Interior',items:[
          {code:'P033',t:'Villa Sara',sub:'Interior design.',d:'A renovation project for a large family home typical of 1980s construction in the Campania hinterland. The intervention introduces order into a fragmented plan: the basement level is opened up through a sunken courtyard that reconnects the living area to the garden, while the ground floor is reorganised around the main stair, with a generous living room and kitchen clearly separated from the landlord’s apartment. The upper floor maintains a more conventional arrangement of rooms along a corridor.<br><br><strong>Location</strong><br>Giugliano in Campania, Naples<br><strong>Client</strong><br>Private<br><strong>Team</strong><br>Renata Guadalupi, Ciro Priore, Martina Russo',layout:['h','h','h','h','h','h'],imgs:["img/P033/P0331.jpg","img/P033/P0332.jpg","img/P033/P0333.jpg","img/P033/P0334.jpg","img/P033/P0335.jpg","img/P033/P0336.jpg"]},
          {code:'P034',t:'B&B 4\u2019s Home',sub:'Interior design.',d:'',imgs:[]},
          {code:'P041',t:'Casa Scarlatta',sub:'Residential design, Naples.',d:'',layout:['h','h','h','h','h','h'],imgs:["img/P041/P0411.jpg","img/P041/P0412.jpg","img/P041/P0413.jpg","img/P041/P0414.jpg","img/P041/P0415.jpg","img/P041/P0416.jpg"]},
          {code:'P046',t:'Casa di',sub:'Interior design.',d:'',layout:['v','v','h','v','h','v','v','h','v','h','v','v','h','v','h','v','v'],imgs:["img/P046/P0461.jpg","img/P046/P0462.jpg","img/P046/P0463.jpg","img/P046/P0464.jpg","img/P046/P0465.jpg","img/P046/P0466.jpg","img/P046/P0467.jpg","img/P046/P0468.jpg","img/P046/P0469.jpg","img/P046/P04610.jpg","img/P046/P04611.jpg","img/P046/P04612.jpg","img/P046/P04613.jpg","img/P046/P04614.jpg","img/P046/P04615.jpg","img/P046/P04616.jpg","img/P046/P04617.jpg"]},
          {code:'P047',t:'Farmacia',sub:'Interior design, Naples.',d:'Conversion of the former pharmacy of the cloister of Santa Maria della Sanità into a ticketing space for guided visits to the Catacombs of San Gaudioso. The intervention preserves the frescoed vaults and cupolas as the dominant visual element, while the lower portion of the room — at human scale — is lined with wooden panelling. The contrast between historic surfaces above and new timber below organises the space without competing with it.<br><br>A raised wooden platform connects two ticket desks, managing visitor flow while defining the operational heart of the room. The project also accommodates a bookshop and waiting areas.<br><br><strong>Location</strong><br>Chiesa di Santa Maria alla Sanità, Naples<br><strong>Client</strong><br>Fondazione San Gennaro<br><strong>Team</strong><br>Nicola Flora, Francesca Iarrusso, Ciro Priore, Domenico Rapuano, Martina Russo',layout:['v','h','v','v','v','v','h','v','h'],imgs:["img/P047/P0471.jpg","img/P047/P0472.jpg","img/P047/P0473.jpg","img/P047/P0474.jpg","img/P047/P0475.jpg","img/P047/P0476.jpg","img/P047/P0477.jpg","img/P047/P0478.jpg","img/P047/P0479.gif"]},
          {code:'P050',t:'Casa Cava',sub:'Residential design, Naples.',d:'Location: Cava de\u2019 Tirreni, Italy<br>Type: Interior Design<br>Design Team: Tommaso Vecci, Ciro Priore<br>Woodworking: Falegnameria Ronca<br>Completion: 2024<br>Photography: Dario Borruto',layout:['v','h','v','h','v','v','h','v','h','v','v','h','v','h','v'],imgs:["img/P050/P0501.jpg","img/P050/P0502.jpg","img/P050/P0503.jpg","img/P050/P0504.jpg","img/P050/P0505.jpg","img/P050/P0506.jpg","img/P050/P0507.jpg","img/P050/P0508.jpg","img/P050/P0509.jpg","img/P050/P05010.jpg","img/P050/P05011.jpg","img/P050/P05012.jpg","img/P050/P05013.jpg","img/P050/P05014.jpg","img/P050/P05015.jpg"]},

      {k:'instexh',l:'Installation & Exhibition',subs:[
        {k:'instexh-all',l:'Installation & Exhibition',items:[
          {code:'P006',t:'Concetta esce di casa',sub:'2016 \u00b7 Installation. Made in Cloister, Naples.',d:'For the presentation of the winning entry of the Siedimi design competition, the 72H collective built an installation drawn from the archetype of the house, reinterpreted through a light, contemporary language. The aim was to create an evocative space that recalled the domestic theme and foregrounded the winning chair — a modern reading of the traditional straw-seated chair.<br><br>The installation reproduced the silhouette of a small house with a pitched roof, constructed as a wireframe of orange PVC water pipes. The structures were wrapped in gauze and semi-transparent mesh, suggesting the idea of a dwelling without fully defining it, letting the interior space show through. This suspension between presence and absence exalted the chair, positioned at the centre of the installation as its symbolic and visual heart.<br><br>Self-built in the cloister of Santa Caterina a Formiello, Naples — a historic setting that amplified the dialogue between tradition and innovation.<br><br><strong>Location</strong><br>Made in Cloister, Naples<br><strong>Client</strong><br>Fondazione Made in Cloister<br><strong>Team</strong><br>Alessandra Coppola, Loredana De Falco, Annamaria Messina, Orazio Nicodemo, Ciro Priore, Martina Russo, Davide Savoia',layout:['h','h','v','h','v','v','h','h','v','v','v','v','v','v','h','h','h'],imgs:["img/P006/P0061.jpg","img/P006/P0062.jpg","img/P006/P0063.jpg","img/P006/P0064.jpg","img/P006/P0065.jpg","img/P006/P0066.jpg","img/P006/P0067.jpg","img/P006/P0068.jpg","img/P006/P0069.jpeg","img/P006/P00610.jpg","img/P006/P00611.jpg","img/P006/P00612.jpg","img/P006/P00613.jpg","img/P006/P00614.jpg","img/P006/P00615.jpg","img/P006/P00616.jpg","img/P006/P00617.jpg"]},
          {code:'P015',t:'PalCo Santo',sub:'2018 \u00b7 Naples.',d:'A temporary liturgical installation for the feast of San Vincenzo — known as <em>‘o Munacone</em> — in the Basilica of Santa Maria alla Sanità. The statue, normally kept behind glass, was brought down to the level of the faithful through a wooden platform that replicated the geometry of the church floor. The platform raised the congregation to the height of the saint — or lowered the saint to the height of the congregation.<br><br><strong>Location</strong><br>Basilica di Santa Maria alla Sanità, Naples<br><strong>Client</strong><br>Basilica di Santa Maria alla Sanità<br><strong>Team</strong><br>Nicola Flora, Ciro Priore, Martina Russo',layout:['v','v','h','h','v','h'],imgs:["img/P015/P0151.jpg","","img/P015/P0153.jpg","img/P015/P0154.jpg","","img/P015/P0156.jpg"]},
          {code:'P022',t:'Villaggio Italia \u2014 N\u00f3veN\u00f3veN\u00f3ve',sub:'2019 \u00b7 Torre del Castello Melodia, Ruvo di Puglia.',d:'An installation presented at <em>Mutazioni</em>, part of the Nòve Nòve Nòve festival in Ruvo di Puglia, curated by Antilia Gallery. The exhibition addressed urban mutation and the transformations produced by climate and economic change.<br><br>Villaggio Italia takes the form of a constructed tableau: a compressed, repeatable typology of the Italian holiday village, deployed as an object of critical observation. The work functions as a still image of a familiar landscape made strange — the domestic logic of the vacation unit isolated, multiplied and placed under scrutiny.<br><br><strong>Location</strong><br>Torre del Castello Melodia, Ruvo di Puglia<br><strong>Client</strong><br>Nòve Nòve Nòve / Antilia Gallery<br><strong>Contributors</strong><br>Ensamble Studio, Formafantasma, Jirì Kamenskich, Francesca Pasquali, Erez Nevi Pana, Eva Gentner, Materia Ordinaria, Summary, Uau Project, Emusic, W.A.R., Tykk',related:'[04-RJA] Villaggio Italia',layout:["v","h","h","v","h","h","v","h","h","h","v","h","h","v","h","h","h"],imgs:["","","","","","","","","","","","","","","","",""]},
          {code:'P030',t:'Recreation Live',sub:'2020 \u00b7 Online.',d:'A participatory virtual performance held on Zoom during the first lockdown of 2020. At a moment when productivity had become a moral imperative, the project invited participants into the most private part of the studio’s work: recreation. Anyone was welcome to join and contribute to the act of doing nothing in particular — together.<br><br><strong>Location</strong><br>zoom.us<br><strong>Client</strong><br>Antilia Gallery<br><strong>Team</strong><br>Ciro Priore, Martina Russo',layout:['h','h','h','h','h','h','h','h','h'],imgs:["img/P030/P0301.jpg","img/P030/P0302.jpg","img/P030/P0303.jpg","img/P030/P0304.mov","img/P030/P0305.jpg","img/P030/P0306.jpg","img/P030/P0307.mov","img/P030/P0308.gif","img/P030/P0309.gif"]},
          {code:'P049',t:'Muro Immaginifico',sub:'2021 \u00b7 Venice.',d:'',layout:['v','h','h','v','h','v','h','v','v','v','v','h','v','v','v','h','h','h','v','v','v','h','h'],imgs:["img/P049/P0491.jpg","img/P049/P0492.jpg","img/P049/P0493.jpg","img/P049/P0494.jpg","img/P049/P0495.jpg","img/P049/P0496.jpg","img/P049/P0497.jpg","img/P049/P0498.jpg","img/P049/P0499.jpg","img/P049/P04910.jpg","img/P049/P04911.jpg","img/P049/P04912.jpg","img/P049/P04913.jpg","img/P049/P04914.mov","img/P049/P04915.jpg","img/P049/P04916.jpg","img/P049/P04917.jpg","img/P049/P04918.jpg","img/P049/P04919.jpg","img/P049/P04920.jpg","img/P049/P04921.jpg","img/P049/P04922.jpg","img/P049/P04923.jpg"]},
          {code:'P050',t:'Pulcinella Velato',sub:'Installation.',d:'',imgs:[]},
          {code:'P055',t:'Pessoa Salerno',sub:'2022 \u00b7 Installation, Pessoa Luna Park, Salerno.',d:'A temporary installation for the 2022 edition of Pessoa Luna Park, held at the Museo del Falso in Salerno. The project reorganised the museum’s white, anonymous interior through a system of wireframe devices — iron frames and wooden panels — designed to serve multiple functions: exhibition shelving, workshop spaces, mobile ticketing points and rest areas.<br><br>The modular logic of the installation evokes the arrival of a travelling circus: a space transformed temporarily and completely, then dismantled without leaving permanent traces.<br><br><strong>Location</strong><br>Salerno<br><strong>Client</strong><br>Collettivo Pessoa<br><strong>Team</strong><br>Eduardo Bassolino, Viviana Saitto, Annunziata Ambrosino, Maria Masi, Ciro Priore, Martina Russo',layout:['v','v','h','v','h','v','v'],imgs:["img/P055/P0551.jpg","img/P055/P0552.jpg","img/P055/P0553.jpg","img/P055/P0554.jpg","img/P055/P0555.jpg","img/P055/P0556.jpg","img/P055/P0557.jpg"]},
          {code:'P060',t:'La Rocchia',sub:'2025 \u00b7 Lago Fusaro, Bacoli.',d:'Within CHANGES.',layout:['v','h','h','v','h','v','h','v','h','v','h','h'],imgs:["img/P060/P0601.jpg","img/P060/P0602.jpg","img/P060/P0603.jpg","img/P060/P0604.jpg","img/P060/P0605.jpg","img/P060/P0606.jpg","img/P060/P0607.jpg","img/P060/P0608.jpg","img/P060/P0609.jpg","img/P060/P06010.jpg","img/P060/P06011.jpg","img/P060/P06012.jpg"]},
          {code:'P069',t:'Disconauta',sub:'2022 \u00b7 Naples.',d:'A temporary microarchitecture designed as a DJ booth for the Pessoa Luna Park. The structure combines the logic of a lifeguard tower with that of a treehouse: a triangular platform supported by three cantilevered portals that intersect at the centre, distributing loads reciprocally. The DJ accesses the top through a hatch in the platform floor, occupying an elevated position at the centre of the dance floor.<br><br>Built entirely through self-construction, starting from a reclaimed pine stump that served as both structural base and symbolic reference point. The platform is decorated with diagonal red stripes.<br><br><strong>Location</strong><br>Parco dei Quartieri Spagnoli, Naples<br><strong>Client</strong><br>Collettivo Pessoa<br><strong>Team</strong><br>Eduardo Bassolino, Viviana Saitto, Annunziata Ambrosino, Maria Masi, Ciro Priore, Martina Russo',layout:['v','h','v','h','h','v','v','v','v','h','v','h'],imgs:["img/P069/P0691.jpg","img/P069/P0692.jpg","img/P069/P0693.jpg","img/P069/P0694.jpg","img/P069/P0695.jpg","img/P069/P0696.jpg","img/P069/P0697.jpg","img/P069/P0698.jpg","img/P069/P0699.gif","img/P069/P06910.jpg","img/P069/P06911.jpg","img/P069/P06912.jpg"]},

      {k:'obj',l:'Object',subs:[

          {code:'P005',t:'/con.c\u00e8t.ta/ nome proprio di sedia',sub:'2016 \u00b7 Product design.',d:'A folding reinterpretation of the traditional Neapolitan straw-seated chair, winner of the Siedimi competition. The chair takes its name from its own directness: simple but strong, it is exactly what it shows. The original was studied, taken apart and re-engineered to fold — freeing it from its domestic immobility without abandoning the idea attached to it. Wood, straw and metal work together to produce a chair that is familiar, portable, economical and handmade. The conviction behind it: the hand is thought.<br><br><strong>Client</strong><br>Fondazione Made in Cloister / Siedimi Competition<br><strong>Team</strong><br>Alessandra Coppola, Loredana De Falco, Annamaria Messina, Orazio Nicodemo, Ciro Priore, Martina Russo, Davide Savoia',layout:['v','h','v','v','h','v','v','v','v','v','v','h'],imgs:["img/P005/P0051.jpg","img/P005/P0052.jpg","img/P005/P0053.jpg","img/P005/P0054.jpg","img/P005/P0055.jpg","img/P005/P0056.jpg","img/P005/P0057.jpg","img/P005/P0058.jpg","img/P005/P0059.jpg","img/P005/P00510.jpg","img/P005/P00511.jpg","img/P005/P00512.jpg"]},

// ── SECTION INDICATOR DOT ──
function initScrollDot(){
  var dot = document.getElementById('scroll-dot-left');
  if(!dot) return;
  var BAR = 34, PAD = 8;

  function updateDot(){
    var right = document.getElementById('right');
    var left = document.getElementById('left');
    var groups = right.querySelectorAll('.proj-group[data-sec]');
    if(!groups.length){ dot.style.display='none'; return; }

    var threshold = right.scrollTop + right.clientHeight * 0.3;
    var activeSec = null;
    groups.forEach(function(g){
      if(g.offsetTop <= threshold) activeSec = g.dataset.sec;
    });
    if(!activeSec) activeSec = groups[0].dataset.sec;

    var target = left.querySelector('.l0[data-k="' + activeSec + '"]');
    if(!target){ dot.style.display='none'; return; }

    // target position relative to viewport
    var rect = target.getBoundingClientRect();
    var dotTop = rect.top + rect.height / 2 - 3;
    dotTop = Math.max(BAR + PAD, Math.min(window.innerHeight - BAR - PAD - 6, dotTop));
    dot.style.top = dotTop + 'px';
    dot.style.display = 'block';
  }

  document.getElementById('right').addEventListener('scroll', updateDot);
  document.getElementById('left').addEventListener('scroll', function(){ setTimeout(updateDot, 50); });
  document.addEventListener('click', function(){ setTimeout(updateDot, 150); });
  setTimeout(updateDot, 300);
}

function buildIdx(w){
  var el=document.getElementById('idx');
  el.innerHTML='';
  allItems=[];
  D[w].sections.forEach(function(sec){
    var b0=mkBtn('l0',sec.l);
    b0.dataset.k = sec.k;
    var d0=mkDiv('l0b');
    b0.onclick=function(){
      var isOpen=b0.classList.contains('on');
      // close all L0
      document.querySelectorAll('.l0').forEach(function(x){x.classList.remove('on');});
      document.querySelectorAll('.l0b').forEach(function(x){x.classList.remove('on');});
      // open this one only if it was closed
      if(!isOpen){
        b0.classList.add('on');
        d0.classList.add('on');
        // scroll right column to first group of this section
        var right = document.getElementById('right');
        var firstGroup = right.querySelector('.proj-group[data-sec="'+sec.k+'"]');
        if(firstGroup){
          right.scrollTo({top: firstGroup.offsetTop - 8, behavior:'smooth'});
        }
      }
      // remove active state
      if(active){active.classList.remove('on');active=null;activeItem=null;}
      document.getElementById('idx').classList.remove('has-active');
    };
    el.appendChild(b0); el.appendChild(d0);
    sec.subs.forEach(function(sub){
      var b1=mkBtn('l1',sub.l);
      var d1=mkDiv('l1b');
      b1.onclick=function(){
        var isOpen=b1.classList.contains('on');
        // close all L1 siblings in this L0
        d0.querySelectorAll('.l1').forEach(function(x){x.classList.remove('on');});
        d0.querySelectorAll('.l1b').forEach(function(x){x.classList.remove('on');});
        if(!isOpen){b1.classList.add('on');d1.classList.add('on');}
        // remove active state
        if(active){active.classList.remove('on');active=null;activeItem=null;}
        document.getElementById('idx').classList.remove('has-active');
      };
      d0.appendChild(b1); d0.appendChild(d1);
      sub.items.forEach(function(item){
        allItems.push(item);
        var row=document.createElement('div');
        row.className='item';
        row.dataset.id=allItems.length-1; row.id='idx-'+mkSlug(item.t); row.id='row-'+mkSlug(item.t);
        row.innerHTML=
          '<div class="item-line"><span class="item-code">'+(item.code||'')+'</span><span class="item-title">'+item.t+'</span></div>'+
          '<div class="item-sub">'+item.sub+'</div>'+
          (item.d && item.d.length>0 ? '<div class="item-desc">'+(item.d.length>180?item.d.substring(0,180)+'…':item.d)+'</div>' : '')+
          (item.d && item.d.length>0 ? '<span class="item-more">more →</span>' : '')+
          (item.link?'<a class="item-link" href="'+item.link+'" target="_blank" rel="noopener">read →</a>':'')+
          (item.related?(function(rel){return rel.split('|').map(function(r){return '<span class="item-related" data-rel="'+r.trim()+'">'+r.trim()+'</span>';}).join('');  })(item.related):'');
        // wire modal button
        (function(row,t,d,rel){
          var btn=row.querySelector('.item-more');
          if(btn) btn.onclick=function(e){ e.stopPropagation(); modalOpen(t,d); };
          // wire all related buttons
          row.querySelectorAll('.item-related').forEach(function(btn){
            btn.onclick=function(e){
              e.stopPropagation();
              var rel=btn.dataset.rel||'';
              var relClean=rel.replace(/^\[[^\]]+\]\s*/,'');
              var worlds=['ciro','mo'];
              for(var wi=0;wi<worlds.length;wi++){
                var w=worlds[wi];
                var secs=D[w].sections;
                for(var si=0;si<secs.length;si++){
                  var subs=secs[si].subs;
                  for(var li=0;li<subs.length;li++){
                    var items=subs[li].items;
                    for(var ii=0;ii<items.length;ii++){
                      var it=items[ii];
                      if(it.t===relClean||it.t===rel||(it.code&&(it.code+' '+it.t===rel||it.code+' '+it.t===relClean))){
                        if(w!==CW) showIdx(w);
                        setTimeout(function(item){ openFromGrid(item); },100,it);
                        return;
                      }
                    }
                  }
                }
              }
            };
          });
        })(row, item.t, item.d||'', item.related||'');
        row.onclick=function(e){
          if(e.target.tagName==='A') return;
          activateItem(row,item);
        };
        d1.appendChild(row);
      });
    });
  });
}

function revealItem(item){

  // hide all real images
  document.querySelectorAll('.cell img').forEach(function(img){
    img.style.display='none';
    img.parentElement.classList.remove('revealed');
    img.parentElement.style.border=document.body.classList.contains('mo-mode')?'1px solid #fff':'1px solid #000';
  });
  // reveal cells belonging to this item
  document.querySelectorAll('.cell[data-item]').forEach(function(c){
    if(c.dataset.item===item.t){
      var img=c.querySelector('img');
      if(img){
        img.style.display='block';
        c.classList.add('revealed');
        c.style.border='none';
        // re-attach click to open lightbox after reveal
        (function(cell,it,allImgs){
          var imgEls=Array.prototype.slice.call(it.imgs||[]);
          var s=imgEls.indexOf(cell.querySelector('img').src.split(',')[0]);
          // find index by position
          var cells=document.querySelectorAll('.cell.revealed[data-item="'+it.t+'"]');
          cell.onclick=function(){
            var idx2=Array.prototype.indexOf.call(cells,cell);
            lbOpen(it.imgs,Math.max(0,idx2));
          };
        })(c,item,item.imgs);
      }
    }
  });
}

function getOffsetTop(el, container){
  var top = 0;
  while(el && el !== container){
    top += el.offsetTop;
    el = el.offsetParent;
  }
  return top;
}

function activateItem(row,item,skipScroll){
  if(active===row){ row.classList.remove('on'); active=null; activeItem=null; document.getElementById('idx').classList.remove('has-active'); return; }
  if(active) active.classList.remove('on');
  // close all other items
  document.querySelectorAll('.item.on').forEach(function(x){x.classList.remove('on');});
  row.classList.add('on'); active=row; activeItem=item;
  document.getElementById('idx').classList.add('has-active');
  revealItem(item);
  // collapse all sections, reopen only path to this row
  document.querySelectorAll('.l0,.l1').forEach(function(x){x.classList.remove('on');});
  document.querySelectorAll('.l0b,.l1b').forEach(function(x){x.classList.remove('on');});
  var l1b=row.parentElement;
  if(l1b && l1b.classList.contains('l1b')){
    l1b.classList.add('on');
    var l1el=l1b.previousElementSibling; if(l1el) l1el.classList.add('on');
    var l0b=l1b.parentElement;
    if(l0b && l0b.classList.contains('l0b')){
      l0b.classList.add('on');
      var l0el=l0b.previousElementSibling; if(l0el) l0el.classList.add('on');
    }
  }
  var leftCol=document.getElementById('left');
  var rightCol=document.getElementById('right');
  var grp=document.getElementById('lbl-'+mkSlug(item.t));
  // scroll left after reflow
  (function(r){
    setTimeout(function(){
      var rowTop = getOffsetTop(r, leftCol);
      leftCol.scrollTo({top:Math.max(0, rowTop-100), behavior:'smooth'});
    }, 50);
  })(row);
  // scroll right: calculate offset relative to #right
  if(!skipScroll && grp){
    var grpTop = getOffsetTop(grp, rightCol);
    rightCol.scrollTo({top:grpTop, behavior:'smooth'});
  }
}

        group.className='proj-group';
        group.id='lbl-gl-'+mkSlug(sub.l);
        group.dataset.sec = sec.k;
        var lbl=document.createElement('div');
        lbl.className='proj-label';
        lbl.textContent=sub.l;
        group.appendChild(lbl);
        var subgrid=document.createElement('div');
        subgrid.className='proj-group-grid';
        group.appendChild(subgrid);
        grid.appendChild(group);

        // render each item as a single cell (or empty if no img)
        var slotCount = 0;
        sub.items.forEach(function(item){
          var el=document.createElement('div');
          el.dataset.item=item.t;
          el.id='lbl-'+mkSlug(item.t);
          var hasImg = item.imgs && item.imgs.length > 0 && item.imgs[0] && item.imgs[0].length > 5;
          if(!hasImg){
            // empty cell with diagonal
            el.className='cell cell-empty h1';
            el.onclick=function(){ openFromGrid(item); };
          } else {
            el.className='cell h1';
            var lbl2=document.createElement('span');
            lbl2.className='cell-placeholder-label';
            var codeStr=item.code?item.code:(item.t?item.t.substring(0,12):'');
            lbl2.textContent=codeStr;
            el.appendChild(lbl2);
            if(!item.draft){
              var ext=item.imgs[0].split('.').pop().toLowerCase();
              if(ext==='mp4'||ext==='webm'){
                var vid=document.createElement('video');
                vid.src=item.imgs[0]; vid.autoplay=true; vid.loop=true; vid.muted=true; vid.playsInline=true;
                vid.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;z-index:2';
                el.appendChild(vid);
              } else {
                var img2=document.createElement('img');
                img2.src=item.imgs[0]; img2.alt=''; img2.loading='lazy';
                el.appendChild(img2);
              }
            }
            (function(c,it){
              c.onmouseenter=function(){
                if(activeItem&&activeItem.t===it.t) return;
                if(it.draft){ c.style.background='#000'; var l=c.querySelector('.cell-placeholder-label'); if(l) l.style.color='#fff'; }
                else { var m=c.querySelector('img,video'); if(m&&m.src&&m.src.length>5&&!c.classList.contains('revealed')){m.style.display='block';c.style.border='none';} }
              };
              c.onmouseleave=function(){
                if(activeItem&&activeItem.t===it.t) return;
                if(it.draft){ c.style.background='#fff'; var l=c.querySelector('.cell-placeholder-label'); if(l) l.style.color='#000'; }
                else { var m=c.querySelector('img,video'); if(m){m.style.display='none';c.style.border=document.body.classList.contains('mo-mode')?'1px solid #fff':'1px solid #000';} }
              };
              c.onclick=function(){ openFromGrid(it); };
            })(el,item);
          }
          subgrid.appendChild(el);
          slotCount++;
        });
        // fill remainder of last row
        var rem=slotCount%4;
        if(rem!==0){ for(var f=0;f<4-rem;f++){ var ep=document.createElement('div'); ep.className='cell cell-empty h1'; subgrid.appendChild(ep); } }
        return;
      }

      sub.items.forEach(function(item){
        // wrapper group
        var group=document.createElement('div');
        group.className='proj-group';
        group.id='lbl-'+mkSlug(item.t);
        group.dataset.sec = sec.k;

        // label
        var lbl=document.createElement('div');
        lbl.className='proj-label';
        lbl.textContent=(item.code?item.code+' ':'')+item.t;
        lbl.dataset.title=item.t;
        group.appendChild(lbl);

        // description above images
        
        // sub-grid for this project's images
        var subgrid=document.createElement('div');
        subgrid.className='proj-group-grid';
        group.appendChild(subgrid);
        grid.appendChild(group);

        buildItemCells(subgrid, item);
      });
    });
  });
}

function openFromGrid(item){
  var rightCol=document.getElementById('right');
  var leftCol=document.getElementById('left');

  // find the row for this item
  var rows=document.querySelectorAll('.item');
  var targetRow=null;
  for(var i=0;i<rows.length;i++){
    var idx=parseInt(rows[i].dataset.id);
    if(allItems[idx] && allItems[idx].t===item.t){
      targetRow=rows[i]; break;
    }
  }
  if(!targetRow) return;

  // close all items and sections
  document.querySelectorAll('.item.on').forEach(function(x){x.classList.remove('on');});
  document.querySelectorAll('.l0,.l1').forEach(function(x){x.classList.remove('on');});
  document.querySelectorAll('.l0b,.l1b').forEach(function(x){x.classList.remove('on');});

  // open path to this row FIRST
  var l1b=targetRow.parentElement;
  if(l1b && l1b.classList.contains('l1b')){
    l1b.classList.add('on');
    var l1el=l1b.previousElementSibling; if(l1el) l1el.classList.add('on');
    var l0b=l1b.parentElement;
    if(l0b && l0b.classList.contains('l0b')){
      l0b.classList.add('on');
      var l0el=l0b.previousElementSibling; if(l0el) l0el.classList.add('on');
    }
  }

  // activate row (mark active, reveal images)
  if(active) active.classList.remove('on');
  targetRow.classList.add('on');
  active=targetRow; activeItem=item;
  document.getElementById('idx').classList.add('has-active');

  // show ongoing notice if no images
  var hasRealImgs = item.imgs && item.imgs.some(function(s){ return s && s.length > 5; });
  var descEl = targetRow.querySelector('.item-desc');
  var moreEl = targetRow.querySelector('.item-more');
  if(!hasRealImgs && !item.draft){
    if(descEl) descEl.textContent = 'Work in progress.';
    if(moreEl) moreEl.style.display = 'none';
  } else {
    if(descEl) descEl.textContent = item.d ? item.d.substring(0,120) + (item.d.length > 120 ? '…' : '') : '';
    if(moreEl) moreEl.style.display = item.d ? 'inline-block' : 'none';
  }

  revealItem(item);
  if(isMobile()) buildMobileGrid(item);

  // scroll both cols after reflow
  var grp=document.getElementById('lbl-'+mkSlug(item.t));
  setTimeout(function(){
    if(grp){
      var label = grp.querySelector('.proj-label');
      var labelPad = label ? parseInt(window.getComputedStyle(label).paddingTop) : 34;
      rightCol.scrollTo({top:Math.max(0, getOffsetTop(grp,rightCol) + labelPad - 8),behavior:'smooth'});
    }
    leftCol.scrollTo({top:Math.max(0,getOffsetTop(targetRow,leftCol)-100),behavior:'smooth'});
  },50);
}

function buildItemCells(grid, item){
  var COLS = 4;
  var imgs = item.imgs || [];
  var layout = item.layout || null;

  // Check if item has no real images
  var hasRealImgs = imgs.some(function(s){ return s && s.length > 5; });
  var isOngoing = !hasRealImgs && !item.draft;

  if(isOngoing){
    // Show 4 empty cells with diagonal — item appears in list only
    for(var oi=0; oi<4; oi++){
      var oel = document.createElement('div');
      oel.className = 'cell cell-empty h1';
      oel.dataset.item = item.t;
      oel.onclick = function(){ openFromGrid(item); };
      grid.appendChild(oel);
    }
    return;
  }

  // Build layout array: 'v'=vertical, 'h'=horizontal, 'e'=empty
  var cells = [];
  if(layout){
    // Use predefined layout
    var imgIdx = 0;
    layout.forEach(function(type){
      if(type === 'e'){
        cells.push({type:'e'});
      } else {
        cells.push({type:type, src: imgs[imgIdx] || null, imgIdx: imgIdx});
        imgIdx++;
      }
    });
  } else {
    // Fallback: all horizontal
    imgs.forEach(function(src, i){ cells.push({type:'h', src:src, imgIdx:i}); });
    if(imgs.length === 0){
      for(var p=0;p<COLS;p++) cells.push({type:'e'});
    }
  }

  // Count slots
  var slotsUsed = 0;
  cells.forEach(function(c){ slotsUsed += c.type==='v' ? 2 : 1; });

  // Fill to next multiple of COLS
  var rem = slotsUsed % COLS;
  var fill = rem === 0 ? 0 : COLS - rem;
  for(var f=0; f<fill; f++) cells.push({type:'e'});

  // Build DOM synchronously
  cells.forEach(function(cellDef, ci){
    var el = document.createElement('div');
    el.dataset.item = item.t;

    if(cellDef.type === 'e'){
      el.className = 'cell cell-empty h1';
      el.onclick = function(){ openFromGrid(item); };
    } else {
      el.className = cellDef.type === 'v' ? 'cell h2' : 'cell h1';

      // always add label (code + image number), visible on white bg
      var lbl = document.createElement('span');
      lbl.className = 'cell-placeholder-label';
      var codeStr = item.code ? item.code : (item.t ? item.t.substring(0,12) : '');
      lbl.textContent = codeStr + (codeStr ? '\u2009' : '') + (cellDef.imgIdx + 1);
      el.appendChild(lbl);

      // add image or video on top if src exists — hidden by default, shown on hover (skip if draft)
      if(!item.draft && cellDef.src && cellDef.src.length > 5){
        var ext = cellDef.src.split('.').pop().toLowerCase();
        if(ext === 'mp4' || ext === 'webm'){
          var vid = document.createElement('video');
          vid.src = cellDef.src;
          vid.autoplay = true; vid.loop = true; vid.muted = true; vid.playsInline = true;
          vid.style.position='absolute'; vid.style.inset='0'; vid.style.width='100%'; vid.style.height='100%'; vid.style.objectFit='cover'; vid.style.display='none'; vid.style.zIndex='2';
          el.appendChild(vid);
        } else {
          var img = document.createElement('img');
          img.src = cellDef.src; img.alt = ''; img.loading = 'lazy';
          el.appendChild(img);
        }
      }

      (function(c, it, imgIdx, allImgs){
        c.onmouseenter = function(){
          if(activeItem && activeItem.t === it.t) return;
          if(it.draft){
            document.querySelectorAll('.cell[data-item]').forEach(function(x){
              if(x.dataset.item === it.t && !x.classList.contains('cell-empty')){
                x.style.background='#000';
                var lbl=x.querySelector('.cell-placeholder-label');
                if(lbl) lbl.style.color='#fff';
              }
            });
          } else {
            document.querySelectorAll('.cell[data-item]').forEach(function(x){
              if(x.dataset.item === it.t){
                var media=x.querySelector('img,video');
                if(media && media.src && media.src.length > 5 && !x.classList.contains('revealed')){
                media.style.display='block';
                x.style.border='none';
              }
              }
            });
          }
        };
        c.onmouseleave = function(){
          if(activeItem && activeItem.t === it.t) return;
          if(it.draft){
            document.querySelectorAll('.cell[data-item]').forEach(function(x){
              if(x.dataset.item === it.t && !x.classList.contains('cell-empty')){
                x.style.background='#fff';
                var lbl=x.querySelector('.cell-placeholder-label');
                if(lbl) lbl.style.color='#000';
              }
            });
          } else {
            document.querySelectorAll('.cell[data-item]').forEach(function(x){
              if(x.dataset.item === it.t && !x.classList.contains('revealed')){
                var media=x.querySelector('img,video');
                if(media){media.style.display='none';x.style.border=document.body.classList.contains('mo-mode')?'1px solid #fff':'1px solid #000';}
              }
            });
          }
        };
        c.onclick = function(){
          if(activeItem && activeItem.t === it.t){
            if(!it.draft && allImgs && allImgs.length > imgIdx) lbOpen(allImgs, imgIdx);
          } else {
            openFromGrid(it);
          }
        };
      })(el, item, cellDef.imgIdx || 0, imgs);
    }
    grid.appendChild(el);
  });
}

function mkSlug(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,"_").substring(0,40);}
function mkBtn(cls,txt){ var b=document.createElement('button'); b.className=cls; b.textContent=txt; return b; }
function mkDiv(cls){ var d=document.createElement('div'); d.className=cls; return d; }

// ── LIGHTBOX ──
function lbOpen(imgs,i){ lbImgs=imgs; lbIdx=i; document.getElementById('lb-img').src=imgs[i]; document.getElementById('lb-c').textContent=(i+1)+' / '+imgs.length; document.getElementById('lb').classList.add('on'); }
function lbClose(){ document.getElementById('lb').classList.remove('on'); }
function lbOvl(e){ if(e.target===document.getElementById('lb')) lbClose(); }
function lbNav(d,e){ e.stopPropagation(); lbIdx=(lbIdx+d+lbImgs.length)%lbImgs.length; document.getElementById('lb-img').src=lbImgs[lbIdx]; document.getElementById('lb-c').textContent=(lbIdx+1)+' / '+lbImgs.length; }
document.addEventListener('keydown',function(e){ if(!document.getElementById('lb').classList.contains('on'))return; if(e.key==='ArrowRight')lbNav(1,{stopPropagation:function(){}}); if(e.key==='ArrowLeft')lbNav(-1,{stopPropagation:function(){}}); if(e.key==='Escape')lbClose(); });

function modalOpen(title, text){
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-text').innerHTML = text;
  document.getElementById('modal').classList.add('on');
}
function modalClose(){
  document.getElementById('modal').classList.remove('on');
}
function modalOvl(e){
  if(e.target===document.getElementById('modal')) modalClose();
}

});

// ── SEARCH ──
function toggleSearch(){
  var overlay = document.getElementById('search-overlay');
  var input = document.getElementById('search-input');
  if(overlay.style.display === 'none'){
    overlay.style.display = 'block';
    input.value = '';
    document.getElementById('search-results').innerHTML = '';
    input.focus();
  } else {
    overlay.style.display = 'none';
  }
}

function buildSearchIndex(){
  var index = [];
  ['ciro','mo'].forEach(function(world){
    D[world].sections.forEach(function(sec){
      sec.subs.forEach(function(sub){
        sub.items.forEach(function(item){
          index.push({world:world, sec:sec.k, item:item});
        });
      });
    });
  });
  return index;
}

var searchIndex = null;
document.addEventListener('DOMContentLoaded', function(){
  var input = document.getElementById('search-input');
  input.addEventListener('input', function(){
    if(!searchIndex) searchIndex = buildSearchIndex();
    var q = this.value.toLowerCase().trim();
    var results = document.getElementById('search-results');
    if(!q){ results.innerHTML = ''; return; }
    var matches = searchIndex.filter(function(e){
      return e.item.t.toLowerCase().indexOf(q) !== -1 ||
             (e.item.code && e.item.code.toLowerCase().indexOf(q) !== -1);
    });
    if(!matches.length){
      results.innerHTML = '<div style="font-size:13px;color:#000;opacity:.5">No results.</div>';
      return;
    }
    results.innerHTML = matches.slice(0,20).map(function(e){
      var world = e.world === 'ciro' ? 'CP' : 'MO';
      return '<div class="search-result" onclick="goToResult(\'' + e.world + '\',\'' + e.sec + '\',\'' + e.item.t.replace(/'/g,"\\'") + '\')" style="padding:10px 0;border-bottom:1px solid #000;cursor:pointer;font-size:13px;color:#000">' +
        '<span style="opacity:.45;margin-right:12px">' + world + '</span>' +
        (e.item.code ? '<span style="margin-right:12px">' + e.item.code + '</span>' : '') +
        e.item.t + '</div>';
    }).join('');
  });
  input.addEventListener('keydown', function(e){ if(e.key==='Escape') toggleSearch(); });
});

function goToResult(world, secKey, title){
  toggleSearch();
  // switch to correct world
  showIdx(world);
  // open the section
  setTimeout(function(){
    var l0 = document.querySelector('.l0[data-k="' + secKey + '"]');
    if(l0) l0.click();
    // scroll to item
    setTimeout(function(){
      var slug = title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
      var grp = document.getElementById('lbl-' + slug);
      if(grp){
        var right = document.getElementById('right');
        var label = grp.querySelector('.proj-label');
        var labelPad = label ? parseInt(window.getComputedStyle(label).paddingTop) : 34;
        right.scrollTo({top: Math.max(0, grp.offsetTop + labelPad - 8), behavior:'smooth'});
      }
    }, 300);
  }, 100);
}

function isMobile(){ return window.innerWidth <= 768; }

function buildMobileGrid(item){
  var existing = document.querySelector('.item-grid-mobile[data-item="'+item.t+'"]');
  if(existing) return;
  var imgs = item.imgs || [];
  var layout = item.layout || [];
  var hasReal = imgs.some(function(s){ return s && s.length > 5; });
  // find the item row
  var rows = document.querySelectorAll('.item');
  var targetRow = null;
  rows.forEach(function(r){ if(r.dataset && r.dataset.item === item.t) targetRow = r; });
  if(!targetRow) return;

  var grid = document.createElement('div');
  grid.className = 'item-grid-mobile';
  grid.dataset.item = item.t;

  if(!hasReal || layout.length === 0){
    // show 2 empty cells
    for(var i=0;i<2;i++){
      var ec = document.createElement('div');
      ec.className = 'mob-cell-empty';
      grid.appendChild(ec);
    }
  } else {
    var imgIdx = 0;
    layout.forEach(function(type){
      var cell = document.createElement('div');
      if(type === 'e'){
        cell.className = 'mob-cell-empty';
      } else {
        cell.className = 'mob-cell' + (type === 'v' ? ' v' : '');
        var src = imgs[imgIdx] || '';
        imgIdx++;
        if(src && src.length > 5){
          var ext = src.split('.').pop().toLowerCase();
          if(ext === 'mp4' || ext === 'mov' || ext === 'webm'){
            var vid = document.createElement('video');
            vid.src = src; vid.autoplay = true; vid.loop = true; vid.muted = true; vid.playsInline = true;
            cell.appendChild(vid);
          } else {
            var img = document.createElement('img');
            img.src = src; img.alt = ''; img.loading = 'lazy';
            cell.appendChild(img);
          }
        }
      }
      grid.appendChild(cell);
    });
  }

  // insert after item-more/item-link line
  targetRow.appendChild(grid);
}
